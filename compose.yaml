services:
  db:
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    environment:
      - DATABASE_URL=${DB_URL}
      - DATABASE_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=db
    container_name: db
    volumes:
      - db-data:/var/lib/postgresql/data
    networks: 
      - app-network

  #web:
  #  build:
  #    context: .
  #  ports:
  #    - "8000:8000"
  #  networks: 
  #    - app-network
  
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    container_name: redis
    volumes:
      - redis-data:/var/lib/redis/data
    networks: 
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db-data:
  redis-data:
