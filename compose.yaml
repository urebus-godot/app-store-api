services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - DATABASE_URL=${DB_URL}
      - DATABASE_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=db
    container_name: db
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/postgresql/data
    networks: 
      - app_network
  
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    container_name: redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass MySecurePassword
    volumes:
      - redis_data:/data
    networks: 
      - app_network

  #web:
  #  build:
  #    context: .
  #  ports:
  #    - "8000:8000"
  #  networks: 
  #    - app-network
  #  depends_on:
  #    - db
  #    - redis
  #
  #
  #   

networks:
  app_network:
    driver: bridge

volumes:
  db_data:
  redis_data:
    driver: local
