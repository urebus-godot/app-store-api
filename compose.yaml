services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - DATABASE_URL=${DB_URL}
      - DATABASE_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=db
    container_name: db
    restart: always
    volumes:
      - db_data:/var/lib/postgresql/data
    networks: 
      - app_network
  
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    container_name: redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks: 
      - app_network
  
  #redis-commander:
  #  image: rediscommander/redis-commander:latest
  #  ports:
  #    - "8081:8081"
  #  container_name: redis-com
  #  restart: always
  #  networks:
  #    - app_network
  #  environment:
  #    - REDIS_HOSTS=local:redis:6379

  web:
    container_name: web
    build:
      context: .
    expose:
      - "8000"
    networks: 
      - app_network
    volumes:
      #- ./project:/app
      - type: bind
        source: app
        target: /src/app
    depends_on:
      - db
      - redis
    restart: always

  nginx:
    container_name: nginx
    image: nginx:alpine
    ports:
      - "80:80"
    networks: 
      - app_network
    depends_on:
      - web
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: always
    

networks:
  app_network:
    driver: bridge

volumes:
  db_data:
  redis_data:
    driver: local
